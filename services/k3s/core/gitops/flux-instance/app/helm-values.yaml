---
instance:
  cluster:
    networkPolicy: false
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
    - image-reflector-controller
    - image-automation-controller
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux
    kustomize:
      patches:
        - patch: |
            - op: add
              path: /spec/template/spec/containers/0/args/-
              value: --concurrent=3
            - op: add
              path: /spec/template/spec/containers/0/args/-
              value: --requeue-dependency=30s
          target:
            kind: Deployment
            name: (kustomize-controller|helm-controller|source-controller)
        - patch: |
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: all
            spec:
              template:
                spec:
                  contrainers:
                    - name: manager
                      resources:
                        limits:
                          memory: 2Gi
          target:
            kind: Deployment
            name: (kustomize-controller|helm-controller|source-controller)
        - patch: |
            - op: add
              path: /spec/template/spec/containers/0/args/-
              value: --concurrent=3
            - op: replace
              path: /spec/template/spec/volumes/0
              value:
                name: temp
                emptyDir:
                  medium: Memory
          target:
            kind: Deployment
            name: kustomize-controller
        - patch: |
            - op: add
              path: /spec/template/spec/containers/0/args/-
              value: --helm-cache-max-size=10
            - op: add
              path: /spec/template/spec/containers/0/args/-
              value: --helm-cache-ttl=60m
            - op: add
              path: /spec/template/spec/containers/0/args/-
              value: --helm-cache-purge-interval=5m
          target:
            kind: Deployment
            name: source-controller
        - patch: |
            - op: add
              path: /spec/template/spec/containers/0/args/-
              value: --feature-gates=OOMWatch=true
          target:
            kind: Deployment
            name: helm-controller
